<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | 仙人Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full p-10 bg-white shadow-2xl rounded-[3rem] text-center">
        <h1 class="text-4xl font-black text-blue-600 mb-2">仙人Account</h1>
        <p class="text-gray-400 mb-8">サインインして続行</p>
        
        <form action="/api/auth/login" method="POST" class="space-y-4">
            <input type="text" name="userId" placeholder="仙人ID" required class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none">
            <input type="password" name="password" placeholder="パスワード" required class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none">
            <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">ログイン</button>
        </form>
        
        <div class="mt-8 pt-6 border-t border-slate-100">
            <p class="text-sm text-gray-500">アカウントをお持ちでないですか？</p>
            <a href="/register.html" class="text-blue-600 font-bold hover:underline">新規アカウント作成</a>
        </div>
    </div>
</body>
</html>
